---
- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
    state: present

- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Ensure Docker service is running
  systemd:
    name: docker
    state: started
    enabled: yes
